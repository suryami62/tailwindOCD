name: Publish Pre-release

on:
  push:
    tags:
      - "v*-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prerelease:
    if: ${{ github.ref_type == 'tag' && contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: true
